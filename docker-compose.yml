services:
    web:
        image: nginx:alpine
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    app:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ./:/var/www
        env_file:
            - .env
        depends_on:
            - db
            - redis

    reverb:
        build:
            context: .
            dockerfile: Dockerfile
        command: php artisan reverb:start --host="0.0.0.0" --port=8080
        ports:
            - "8080:8080"
        volumes:
            - ./:/var/www
        env_file:
            - .env
        depends_on:
            - redis

    worker:
        build:
            context: .
            dockerfile: Dockerfile
        command: php artisan queue:work --sleep=3 --tries=3
        volumes:
            - ./:/var/www
        env_file:
            - .env
        depends_on:
            - redis
            - db

    db:
        image: mysql:8.0
        ports:
            - "3306:3306"
        environment:
            MYSQL_DATABASE: "${DB_DATABASE}"
            MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
        volumes:
            - db_data:/var/lib/mysql

    redis:
        image: redis:alpine
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data

volumes:
    db_data:
    redis_data:
